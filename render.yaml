services:
  - type: web
    name: red-app
    runtime: php
    repo: https://github.com/Crisls24/red_app
    plan: free
    region: oregon
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: red-app-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: red-app-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: red-app-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: red-app-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: red-app-db
          property: password

databases:
  - name: red-app-db
    plan: free
    region: oregon
    databaseName: red_app
    user: red_app
